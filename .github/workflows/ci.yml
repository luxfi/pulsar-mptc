name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go-test:
    name: Go reference impl + KAT + Class N1 interop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build (Go ref)
        run: go build ./ref/go/...

      - name: Test (Go ref, all)
        run: go test -count=1 -race -timeout=900s ./ref/go/...

      - name: KAT replay
        run: |
          set -o pipefail
          ./scripts/test.sh

  spec-pdf:
    name: spec PDF build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install TeX Live (latexmk + amsmath + cleveref + fonts)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base texlive-latex-recommended \
            texlive-latex-extra texlive-fonts-recommended \
            texlive-fonts-extra texlive-science latexmk \
            cm-super

      - name: Build pulsar.pdf
        working-directory: spec
        run: latexmk -pdf -interaction=nonstopmode -halt-on-error pulsar.tex

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: pulsar-pdf
          path: spec/pulsar.pdf
          if-no-files-found: error

  high-assurance:
    name: Jasmin type-check + EasyCrypt admit budget + EC compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache opam + tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.opam
          key: opam-jasmin-easycrypt-${{ runner.os }}-v2

      - name: Install system deps (OCaml + Why3 SMT)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            opam ocaml-nox m4 pkg-config libgmp-dev libpcre3-dev \
            z3 alt-ergo zlib1g-dev

      - name: opam init (idempotent)
        run: |
          if [ ! -d ~/.opam ]; then
            opam init --bare --disable-sandboxing --yes
          fi
          opam update -y || true

      - name: opam switch jasmin (idempotent)
        run: |
          if ! opam switch list --short | grep -q '^jasmin$' ; then
            opam switch create jasmin 4.14.2 --yes
          fi
          eval $(opam env --switch=jasmin)
          opam install jasmin --yes

      - name: Install EasyCrypt (source build)
        run: |
          eval $(opam env --switch=jasmin)
          if ! command -v easycrypt >/dev/null 2>&1; then
            git clone --depth 1 https://github.com/EasyCrypt/easycrypt.git /tmp/easycrypt-src
            cd /tmp/easycrypt-src && opam install . --yes
          fi

      - name: Configure why3 / EasyCrypt
        run: |
          eval $(opam env --switch=jasmin)
          easycrypt why3config || true

      - name: Fetch libjade (pinned commit)
        run: bash jasmin/ml-dsa-65/fetch.sh

      - name: Run high-assurance gate
        run: |
          eval $(opam env --switch=jasmin)
          bash scripts/check-high-assurance.sh

  jasmin-ct-leakage:
    # Tracked allowed-failure job. Runs jasmin-ct --infer over the
    # threshold .jazz files and the upstream libjade Dilithium sign
    # path; uploads the report as an artifact. This is ALLOWED TO FAIL
    # today because libjade upstream (commit 9426b32) is missing the
    # public/secret annotations on sign.jazz (random_zeta_p flagged as
    # secret that needs to be public — see jasmin/ml-dsa-65/keygen_end.jinc:125).
    #
    # Tracking: https://github.com/luxfi/pulsar-mptc/issues/2
    # ("Vendor libjade Dilithium CT annotations and flip jasmin-ct gate
    # from advisory to blocking"). When the libjade overlay lands and
    # all four .jazz files pass jasmin-ct --infer, remove
    # `continue-on-error` from this job to make it blocking.
    name: jasmin-ct leakage check (tracked allowed-failure, #2)
    needs: high-assurance
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Restore opam cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.opam
          key: opam-jasmin-easycrypt-${{ runner.os }}-v2

      - name: Fetch libjade (pinned commit)
        run: bash jasmin/ml-dsa-65/fetch.sh

      - name: jasmin-ct on threshold layer
        id: ct
        run: |
          eval $(opam env --switch=jasmin)
          mkdir -p ct/reports
          rc=0
          for f in jasmin/threshold/round1.jazz \
                   jasmin/threshold/round2.jazz \
                   jasmin/threshold/combine.jazz ; do
            [[ -f "$f" ]] || continue
            base=$(basename "$f" .jazz)
            echo "==> $f"
            if ! jasmin-ct --infer \
                 -I "Jade=$PWD/jasmin/ml-dsa-65/libjade/oldsrc-should-delete" \
                 "$f" 2>&1 | tee "ct/reports/${base}.log" ; then
              rc=2
            fi
          done
          echo "ct-rc=$rc" >> $GITHUB_OUTPUT
          # Always exit 0 — the continue-on-error: true above already
          # marks the job as allowed-failure, but we also want the
          # artifact upload step to fire.
          exit 0

      - name: Upload jasmin-ct report
        uses: actions/upload-artifact@v4
        with:
          name: jasmin-ct-report
          path: ct/reports/
          if-no-files-found: warn

      - name: Mark CT result
        run: |
          if [[ "${{ steps.ct.outputs.ct-rc }}" = "2" ]]; then
            echo "::warning::jasmin-ct reported leakage findings — see artifact 'jasmin-ct-report'. Tracked under issue #2 (libjade public/secret annotations)."
          else
            echo "::notice::jasmin-ct clean across all threshold .jazz files. Once libjade upstream lands the public/secret annotations, this job can be flipped from continue-on-error to blocking."
          fi
